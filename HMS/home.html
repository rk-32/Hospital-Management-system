<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <h1>Dashboard</h1>
</header>

<div class="dash-cards">

  <div class="card">
    <h3>Total Patients</h3>
    <p id="totalPatients">120</p>
  </div>

  <div class="card">
    <h3>Total Doctors</h3>
    <p id="totalDoctors">35</p>
  </div>

  <div class="card">
    <h3>Upcoming Appointments</h3>
    <p id="totalAppointments">24</p>
  </div>

  <div class="card">
    <h3>Today's Revenue</h3>
    <p id="revenue">£2,400</p>
  </div>

</div>

</body>
</html>
